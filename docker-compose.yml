services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neuroassist
      POSTGRES_USER: neuroassist
      POSTGRES_PASSWORD: neuroassist_local
    ports:
      - "5432:5432"
    volumes:
      - neuroassist_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuroassist -d neuroassist"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://neuroassist:neuroassist_local@db:5432/neuroassist
    depends_on:
      db:
        condition: service_healthy

volumes:
  neuroassist_pgdata:

